<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ops Engine</title>
    <style>
      :root {
        --global-nav-muted: #64748b;
        --global-nav-line: rgba(148, 163, 184, 0.34);
        --global-nav-bg: rgba(255, 255, 255, 0.86);
        --global-nav-active: #2563eb;
      }
      body { margin: 0; }
      .global-dashboard-nav {
        position: sticky;
        top: 0;
        z-index: 1000;
        width: min(1500px, calc(100% - 40px));
        margin: 16px auto -6px;
        padding: 10px;
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
        border: 1px solid var(--global-nav-line);
        border-radius: 22px;
        background: var(--global-nav-bg);
        backdrop-filter: blur(18px);
        box-shadow: 0 14px 45px rgba(15, 23, 42, 0.08);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .global-dashboard-nav span {
        color: var(--global-nav-muted);
        font-size: 12px;
        font-weight: 950;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        padding: 0 6px;
      }
      .global-dashboard-nav a {
        color: #475569;
        text-decoration: none;
        padding: 9px 13px;
        border-radius: 999px;
        font-size: 13px;
        font-weight: 900;
        background: #f8fafc;
        border: 1px solid transparent;
      }
      .global-dashboard-nav a:hover,
      .global-dashboard-nav a.active {
        color: var(--global-nav-active);
        border-color: #bfdbfe;
        background: #eff6ff;
      }
      @media (max-width: 850px) {
        .global-dashboard-nav { width: min(100% - 24px, 1500px); margin-top: 12px; }
      }
    </style>
  </head>
  <body>
    <nav class="global-dashboard-nav" aria-label="Ops Engine dashboard navigation">
      <span>Dashboards</span>
      <a href="/" class="active">Mission Control</a>
      <a href="/SOC">SOC</a>
      <a href="/NOC">NOC</a>
      <a href="/GRC">GRC</a>
    </nav>
    <div id="root"></div>
    <script type="module" src="/src/App.tsx"></script>
  </body>
</html>
